steps:
  # Step 0: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/vitalsim:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/vitalsim:latest'
      - '.'

  # Step 1: Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vitalsim:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vitalsim:latest']

  # Step 2: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vitalsim'
      - '--image=gcr.io/$PROJECT_ID/vitalsim:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'

images:
  - 'gcr.io/$PROJECT_ID/vitalsim:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/vitalsim:latest'

options:
  logging: CLOUD_LOGGING_ONLY
